# 基于布丁狗订阅转换 override 改造
# 规则源: MetaCubeX/meta-rules-dat + blackmatrix7/ios_rule_script
# 分组: PROXY(主) / AUTO / AIGC / Telegram / Google / 地区(HK TW SG US JP)

proxy-groups:
  - name: PROXY
    type: select
    icon: https://testingcf.jsdelivr.net/gh/Orz-3/mini@master/Color/Static.png
    proxies:
      - AUTO
      - DOWNLOAD
      - 🇭🇰 HK
      - 🇹🇼 TW
      - 🇸🇬 SG
      - 🇺🇸 US
      - 🇯🇵 JP
      - DIRECT
  - name: AUTO
    type: url-test
    icon: https://testingcf.jsdelivr.net/gh/Orz-3/mini@master/Color/Urltest.png
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|0\.1倍|0\.01倍|下载|download
    interval: 120
    tolerance: 50
  - name: 🤖 AIGC
    type: select
    icon: https://testingcf.jsdelivr.net/gh/Orz-3/mini@master/Color/OpenAI.png
    proxies:
      - 🇯🇵 JP
      - 🇸🇬 SG
      - 🇺🇸 US
      - DIRECT
  - name: Telegram
    type: select
    icon: https://testingcf.jsdelivr.net/gh/Orz-3/mini@master/Color/Telegram.png
    proxies:
      - 🇭🇰 HK
      - 🇸🇬 SG
      - 🇯🇵 JP
      - 🇺🇸 US
  - name: Google
    type: select
    icon: https://testingcf.jsdelivr.net/gh/Orz-3/mini@master/Color/Google.png
    proxies:
      - 🇭🇰 HK
      - 🇸🇬 SG
      - 🇯🇵 JP
      - 🇺🇸 US
  - name: 🇭🇰 HK
    type: url-test
    icon: https://testingcf.jsdelivr.net/gh/Orz-3/mini@master/Color/HK.png
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|0\.1倍|0\.01倍|下载|download
    filter: (?i)香港|Hong Kong|HK|🇭🇰
    interval: 120
    tolerance: 50
  - name: 🇹🇼 TW
    type: url-test
    icon: https://testingcf.jsdelivr.net/gh/Orz-3/mini@master/Color/TW.png
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|0\.1倍|0\.01倍|下载|download
    filter: (?i)台湾|Taiwan|TW|🇹🇼
    interval: 120
    tolerance: 50
  - name: 🇸🇬 SG
    type: url-test
    icon: https://testingcf.jsdelivr.net/gh/Orz-3/mini@master/Color/SG.png
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|0\.1倍|0\.01倍|下载|download
    filter: (?i)新加坡|Singapore|🇸🇬
    interval: 120
    tolerance: 50
  - name: 🇺🇸 US
    type: url-test
    icon: https://testingcf.jsdelivr.net/gh/Orz-3/mini@master/Color/US.png
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|0\.1倍|0\.01倍|下载|download
    filter: (?i)美国|USA|🇺🇸
    interval: 120
    tolerance: 50
  - name: 🇯🇵 JP
    type: url-test
    icon: https://testingcf.jsdelivr.net/gh/Orz-3/mini@master/Color/JP.png
    include-all: true
    exclude-filter: (?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|0\.1倍|0\.01倍|下载|download
    filter: (?i)日本|Japan|🇯🇵
    interval: 120
    tolerance: 50
  - name: DOWNLOAD
    type: url-test
    icon: https://testingcf.jsdelivr.net/gh/Orz-3/mini@master/Color/Thunder.png
    include-all: true
    filter: (?i)0\.1倍|0\.01倍|下载|download
    interval: 120
    tolerance: 50

